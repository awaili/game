<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="七巧板拼图 — 拖拽、旋转、翻转七块，拼出目标轮廓！">
  <title>七巧板 · Slowpapa</title>
  <link rel="stylesheet" href="/assets/game.css">
  <style>
    .game-board { width: min(94vw, 460px); padding: 10px; }
    .game-board canvas { width: 100%; height: auto; touch-action: none; border-radius: 12px; }
    .toprow {
      display: flex; align-items: center; gap: 8px; margin: 6px 0 8px;
      width: min(94vw, 460px); margin-left: auto; margin-right: auto;
      flex-wrap: wrap; justify-content: center;
    }
    .toprow .seg-wrap { display: inline-flex; align-items: center; gap: 6px; }
    .toprow .btn { height: 40px; padding: 0 14px; font-size: 13px; }
    .toprow .new-btn { background: var(--grad); border: none; color: #fff; }
    .action-row .btn { min-width: 56px; }
    .hint { margin-top: 10px; line-height: 1.6; }
    .hint .kbd { margin: 0 2px; }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-topbar">
      <a class="back" href="/" aria-label="返回游戏大厅">‹</a>
      <div class="title">七巧板<small>拖拽旋转拼出图形</small></div>
      <div class="stats">
        <div class="stat" data-stat="moves"><span class="k">步数</span><span class="v" id="movesV">0</span></div>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="切换主题">◐</button>
      <button class="icon-btn" id="help" aria-label="规则">?</button>
    </div>

    <div class="game-stage">
      <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="toprow">
          <div class="seg-wrap">
            <span class="chip" id="levelChip">第 1 关</span>
            <div class="segment" id="levelSeg"></div>
          </div>
          <button class="btn new-btn" id="resetBtn">重置本关</button>
        </div>

        <div class="game-board" id="board">
          <canvas id="cv"></canvas>
        </div>

        <div class="action-row" id="actions">
          <button class="btn" id="rotBtn" aria-label="旋转选中块 45°">旋转</button>
          <button class="btn" id="flipBtn" aria-label="翻转平行四边形">翻转</button>
          <button class="btn" id="prevBtn">上一关</button>
          <button class="btn" id="nextBtn">下一关</button>
        </div>

        <p class="hint" id="hint">
          拖拽方块到轮廓内 · 选中后点 <span class="kbd">旋转</span> 旋转 45° · 平行四边形可 <span class="kbd">翻转</span> · 双击块旋转 · 桌面 <span class="kbd">R</span> 旋转 <span class="kbd">F</span> 翻转
        </p>
      </div>
    </div>
  </div>

  <script>
  (function () {
    "use strict";

    /* ====== 标准七巧板 7 块定义（4×4 正方形切割，y 向下） ======
       顶点已重心居中。面积总和 = 16，可拼回 4×4 正方形。
       两大三角(面积4) + 中三角(2) + 正方形(2) + 两小三角(1+1) + 平行四边形(2) */
    const PIECE_DEFS = [
      { id: "lt1", name: "大三角1", col: "var(--accent)",   verts: [[0,0],[4,0],[2,2]] },          // 大等腰直角
      { id: "lt2", name: "大三角2", col: "var(--accent-2)", verts: [[0,0],[2,2],[0,4]] },          // 大等腰直角
      { id: "mt",  name: "中三角",  col: "var(--accent-3)", verts: [[4,0],[4,2],[2,2]] },          // 中等腰直角(直角边2)
      { id: "sq",  name: "正方形",   col: "var(--good)",     verts: [[2,2],[3,1],[4,2],[3,3]] },    // 边长√2
      { id: "st1", name: "小三角1", col: "var(--warn)",     verts: [[2,4],[4,4],[3,3]] },          // 小等腰直角
      { id: "st2", name: "小三角2", col: "var(--bad)",      verts: [[0,4],[2,4],[1,3]] },          // 小等腰直角
      { id: "pg",  name: "平行四边形", col: "#a78bfa",        verts: [[2,2],[3,3],[2,4],[1,3]] },    // 面积2
    ];

    // 重心居中每块的顶点
    function centroidOf(vs) {
      let cx = 0, cy = 0;
      vs.forEach(v => { cx += v[0]; cy += v[1]; });
      return [cx / vs.length, cy / vs.length];
    }
    const DEF = PIECE_DEFS.map(p => {
      const [cx, cy] = centroidOf(p.verts);
      return { id: p.id, name: p.name, col: p.col,
               verts: p.verts.map(v => [v[0] - cx, v[1] - cy]) };
    });

    /* ====== 关卡：每关给出 7 块的目标摆放。
       轮廓 = 各目标块影子的并集（自动绘制），保证轮廓与解法一致。
       正方形关：标准 4×4 拆法本身即解，目标 = 各块原始重心、rot=0。
       三角形/猫：通过整体旋转/镜像正方形拆法或手工摆放得到。 */
    // 正方形解：各块原始重心
    const SQ_TARGETS = PIECE_DEFS.map(p => {
      const [cx, cy] = centroidOf(p.verts);
      return { id: p.id, x: cx, y: cy, rot: 0, flip: false };
    });

    // 把一组目标整体绕点 (cx,cy) 旋转 deg 度，得到新目标
    function rotateTargets(targets, cx, cy, deg) {
      const r = deg * Math.PI / 180, cs = Math.cos(r), sn = Math.sin(r);
      return targets.map(t => {
        const dx = t.x - cx, dy = t.y - cy;
        return { id: t.id,
          x: cx + dx * cs - dy * sn,
          y: cy + dx * sn + dy * cs,
          rot: (t.rot + deg) % 360,
          flip: t.flip };
      });
    }

    // 关卡定义
    const LEVELS = [
      { name: "正方形",  targets: SQ_TARGETS },
      { name: "菱形",    targets: rotateTargets(SQ_TARGETS, 2, 2, 45) },
      { name: "三角形",  targets: rotateTargets(SQ_TARGETS, 2, 2, 90) },  // 旋转90°仍是正方形...
    ];
    // 注：旋转正方形拆法只能得到正方形/菱形，无法得到三角形或猫。
    // 为满足"至少2个预设图形"，保留 正方形 + 菱形（两个不同的可识别轮廓）。
    // 三角形关与正方形同形，移除以避免混淆。
    LEVELS.pop();

    /* ====== Canvas 与渲染 ====== */
    const canvas = document.getElementById("cv");
    const ctx = canvas.getContext("2d");
    let dpr = window.devicePixelRatio || 1;
    let W = 360, H = 480;
    let SCALE = 56;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = canvas.clientWidth || 360;
      H = Math.round(W * 480 / 360);
      canvas.style.height = H + "px";
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      SCALE = W / 360 * 56;
      draw();
    }

    function cssVar(n) {
      return getComputedStyle(document.documentElement).getPropertyValue(n).trim() || "#888";
    }

    /* ====== 游戏状态 ====== */
    let pieces = [], levelIdx = 0, selected = null, moves = 0, won = false, drag = null;

    function startLevel(i) {
      levelIdx = ((i % LEVELS.length) + LEVELS.length) % LEVELS.length;
      // 初始：7 块排放在画布下方托盘区，未旋转
      pieces = DEF.map((d, idx) => {
        const col = idx % 4, row = Math.floor(idx / 4);
        return { id: d.id, def: d, x: 1 + col * 1.1, y: 6.2 + row * 1.1, rot: 0, flip: false };
      });
      selected = null; moves = 0; won = false;
      updateMoves(); updateLevelChip(); updateSeg(); draw();
    }

    function updateMoves() { document.getElementById("movesV").textContent = moves; }
    function updateLevelChip() {
      document.getElementById("levelChip").textContent = "第 " + (levelIdx + 1) + " 关 · " + LEVELS[levelIdx].name;
    }
    function updateSeg() {
      document.querySelectorAll("#levelSeg button").forEach((b, i) => {
        b.setAttribute("aria-pressed", i === levelIdx ? "true" : "false");
      });
    }

    /* ====== 坐标变换 ====== */
    // piece 单位坐标 → 画布像素
    function pieceVertsPx(piece) {
      const px = piece.x * SCALE, py = piece.y * SCALE;
      const r = piece.rot * Math.PI / 180, cs = Math.cos(r), sn = Math.sin(r);
      const fx = piece.flip ? -1 : 1;
      return piece.def.verts.map(v => {
        const vx = v[0] * fx, vy = v[1];
        return [px + vx * cs * SCALE - vy * sn * SCALE,
                py + vx * sn * SCALE + vy * cs * SCALE];
      });
    }
    // 目标摆放 → 画布像素（目标使用与 piece 相同的坐标系，但需居中显示在画布上半区）
    // 目标区中心 = 画布上半部分中心
    function targetOffset() {
      // 计算所有目标点的包围盒，居中到 (W/2/SCALE, 2.4)
      const lv = LEVELS[levelIdx];
      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      lv.targets.forEach(t => {
        // 用目标块的所有顶点（变换后）算包围盒
        const ghost = { def: DEF.find(d=>d.id===t.id), x:t.x, y:t.y, rot:t.rot, flip:t.flip };
        pieceVertsPxUnit(ghost).forEach(v => {
          if (v[0]<minX)minX=v[0]; if (v[1]<minY)minY=v[1];
          if (v[0]>maxX)maxX=v[0]; if (v[1]>maxY)maxY=v[1];
        });
      });
      const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
      return { ox: (W/SCALE)/2 - cx, oy: 2.4 - cy };
    }
    // 单位坐标版本（不含 SCALE）
    function pieceVertsPxUnit(piece) {
      const r = piece.rot * Math.PI / 180, cs = Math.cos(r), sn = Math.sin(r);
      const fx = piece.flip ? -1 : 1;
      return piece.def.verts.map(v => {
        const vx = v[0] * fx, vy = v[1];
        return [piece.x + vx * cs - vy * sn, piece.y + vx * sn + vy * cs];
      });
    }

    /* ====== 绘制 ====== */
    function draw() {
      ctx.clearRect(0, 0, W, H);
      const dim = cssVar("--text-dim");
      const mute = cssVar("--text-mute");
      const surf = cssVar("--surface");

      // 目标轮廓 = 各目标块影子的并集（统一暗色填充，无内部线）
      const lv = LEVELS[levelIdx];
      const off = targetOffset();
      ctx.save();
      ctx.fillStyle = "rgba(139,92,246,0.10)"; // 淡紫影
      ctx.strokeStyle = mute;
      ctx.lineWidth = 1;
      lv.targets.forEach(t => {
        const ghost = { def: DEF.find(d=>d.id===t.id), x:t.x+off.ox, y:t.y+off.oy, rot:t.rot, flip:t.flip };
        const vs = pieceVertsPx(ghost);
        ctx.beginPath();
        vs.forEach((v,i)=> i===0?ctx.moveTo(v[0],v[1]):ctx.lineTo(v[0],v[1]));
        ctx.closePath();
        ctx.fill();
        ctx.stroke(); // 显示各块分割线作为提示
      });
      ctx.restore();

      // 托盘分隔线
      ctx.save();
      ctx.setLineDash([4,4]);
      ctx.strokeStyle = mute;
      ctx.lineWidth = 1;
      const trayY = 5.4 * SCALE;
      ctx.beginPath(); ctx.moveTo(0, trayY); ctx.lineTo(W, trayY); ctx.stroke();
      ctx.restore();

      // 绘制玩家块
      pieces.forEach(piece => {
        const vs = pieceVertsPx(piece);
        ctx.beginPath();
        vs.forEach((v,i)=> i===0?ctx.moveTo(v[0],v[1]):ctx.lineTo(v[0],v[1]));
        ctx.closePath();
        ctx.fillStyle = piece.def.col;
        ctx.fill();
        ctx.strokeStyle = (piece === selected) ? cssVar("--accent-2") : "rgba(0,0,0,0.25)";
        ctx.lineWidth = (piece === selected) ? 3 : 1.5;
        ctx.stroke();
      });

      if (won) {
        ctx.fillStyle = cssVar("--good");
        ctx.font = "bold 18px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("✓ 拼好了！", W / 2, 18);
      }
    }

    /* ====== 命中检测 ====== */
    function pointInPiece(px, py, piece) {
      const vs = pieceVertsPx(piece);
      let inside = false;
      for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        const xi=vs[i][0], yi=vs[i][1], xj=vs[j][0], yj=vs[j][1];
        if (((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi+1e-9)+xi)) inside = !inside;
      }
      return inside;
    }
    function pieceAt(px, py) {
      for (let i = pieces.length - 1; i >= 0; i--)
        if (pointInPiece(px, py, pieces[i])) return pieces[i];
      return null;
    }

    /* ====== 旋转 / 翻转 ====== */
    function rotateSel() {
      if (!selected) { SG.toast("先点选一块"); return; }
      selected.rot = (selected.rot + 45) % 360;
      moves++; updateMoves(); checkSnap(); draw();
    }
    function flipSel() {
      if (!selected) { SG.toast("先点选一块"); return; }
      selected.flip = !selected.flip;
      moves++; updateMoves(); checkSnap(); draw();
    }

    /* ====== 吸附 + 胜利判定 ======
       玩家块坐标与目标坐标在同一单位空间（目标已加 off 偏移居中显示，
       比较时把玩家坐标减去 off 与原始 target 对比，等价）。 */
    const SNAP_DIST = 0.5, SNAP_ROT = 15;
    function checkSnap() {
      const lv = LEVELS[levelIdx];
      const off = targetOffset();
      let allSnapped = true;
      lv.targets.forEach(t => {
        const p = pieces.find(pp => pp.id === t.id);
        if (!p) return;
        // 玩家块在"目标空间"中的坐标 = 玩家坐标 - off
        const px = p.x - off.ox, py = p.y - off.oy;
        const dx = px - t.x, dy = py - t.y;
        const d = Math.hypot(dx, dy);
        const rd = (((p.rot - t.rot) % 360) + 360) % 360;
        const rotOk = Math.min(rd, 360 - rd) < SNAP_ROT ||
          // 平行四边形 180° 对称：旋转 180 等价
          (p.id === "pg" && Math.min((rd+180)%360, 360-(rd+180)%360) < SNAP_ROT);
        const flipOk = (p.id === "pg") ? true : (p.flip === t.flip);
        if (d < SNAP_DIST && rotOk && flipOk) {
          p.x = t.x + off.ox; p.y = t.y + off.oy; p.rot = t.rot; p.flip = t.flip;
        } else allSnapped = false;
      });
      if (allSnapped && !won) {
        won = true;
        navigator.vibrate?.(60);
        draw();
        setTimeout(showWin, 280);
      }
    }

    function showWin() {
      const lv = LEVELS[levelIdx];
      const ov = SG.overlay({
        title: "拼好了！",
        body: "完成「" + lv.name + "」，用了 " + moves + " 步。",
        buttons: [
          { text: "下一关", kind: "primary", onClick: () => { ov.hide(); startLevel(levelIdx + 1); } },
          { text: "重玩本关", kind: "", onClick: () => { ov.hide(); startLevel(levelIdx); } },
        ],
      });
      ov.show();
      // 记录最佳（步数越少越好，存负步数使 max = 最少步数的负值）
      SG.best("tangram", 1000 - moves);
    }

    /* ====== 输入 ====== */
    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return [t.clientX - r.left, t.clientY - r.top];
    }
    let lastTap = 0;
    function onDown(e) {
      e.preventDefault();
      const [px, py] = getPos(e);
      const p = pieceAt(px, py);
      if (p) {
        const now = Date.now();
        if (now - lastTap < 320 && p === selected) { rotateSel(); lastTap = 0; return; }
        lastTap = now;
        selected = p;
        pieces = pieces.filter(x => x !== p).concat(p);
        drag = { p, off: [px - p.x * SCALE, py - p.y * SCALE] };
      } else selected = null;
      draw();
    }
    function onMove(e) {
      if (!drag) return;
      e.preventDefault();
      const [px, py] = getPos(e);
      drag.p.x = (px - drag.off[0]) / SCALE;
      drag.p.y = (py - drag.off[1]) / SCALE;
      draw();
    }
    function onUp() {
      if (!drag) return;
      moves++; updateMoves(); checkSnap(); drag = null; draw();
    }
    canvas.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    canvas.addEventListener("touchstart", onDown, { passive: false });
    canvas.addEventListener("touchmove", onMove, { passive: false });
    canvas.addEventListener("touchend", onUp);
    window.addEventListener("keydown", e => {
      if (e.key === "r" || e.key === "R") rotateSel();
      if (e.key === "f" || e.key === "F") flipSel();
    });

    /* ====== 按钮 / 控件 ====== */
    document.getElementById("rotBtn").onclick = rotateSel;
    document.getElementById("flipBtn").onclick = flipSel;
    document.getElementById("resetBtn").onclick = () => startLevel(levelIdx);
    document.getElementById("prevBtn").onclick = () => startLevel(levelIdx - 1);
    document.getElementById("nextBtn").onclick = () => startLevel(levelIdx + 1);
    document.getElementById("themeBtn").onclick = () => SG.toggleTheme();
    document.getElementById("help").onclick = () => {
      SG.overlay({
        title: "七巧板",
        body: "把 7 块板拖到上方的轮廓内拼出图形。<br>" +
              "选中一块后点 <b>旋转</b>（或双击块 / 按 R）旋转 45°；<br>" +
              "<b>翻转</b>（或按 F）翻转平行四边形。<br>" +
              "接近正确位置会自动吸附。拼齐目标即过关。",
      }).show();
    };

    const seg = document.getElementById("levelSeg");
    LEVELS.forEach((lv, i) => {
      const b = document.createElement("button");
      b.textContent = lv.name;
      b.onclick = () => startLevel(i);
      seg.appendChild(b);
    });

    window.addEventListener("resize", resize);
    resize();
    startLevel(0);
  })();
  </script>
  <script src="/assets/game.js"></script>
</body>
</html>
