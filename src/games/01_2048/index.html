<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="2048 数字合并益智游戏 — 滑动方块，相同相加，挑战 2048！">
  <title>2048 · Slowpapa</title>
  <link rel="stylesheet" href="/assets/game.css">
  <style>
    /* ---- 2048 局部样式 ---- */
    .game-board { width: min(94vw, 460px); aspect-ratio: 1 / 1; padding: 12px; }
    .game-board canvas { width: 100%; height: 100%; touch-action: none; border-radius: 12px; }

    .board-wrap { position: relative; width: 100%; height: 100%; }
    .board-wrap canvas { position: absolute; inset: 0; }

    .toprow {
      display: flex; align-items: center; gap: 10px; margin: 6px 0 2px;
      width: min(94vw, 460px); margin-left: auto; margin-right: auto;
    }
    .toprow .spacer { flex: 1; }
    .toprow .btn { height: 40px; padding: 0 16px; font-size: 14px; }
    .toprow .new-btn { background: var(--grad); border: none; color: #fff; }

    .hint { margin-top: 10px; }
    .hint .kbd { margin: 0 2px; }

    /* 胜利庆祝时给棋盘加个微光 */
    .game-board.win-glow { box-shadow: 0 0 0 2px var(--accent-2), var(--shadow); }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-topbar">
      <a class="back" href="/" aria-label="返回游戏大厅">‹</a>
      <div class="title">2048<small>滑动合并，挑战 2048</small></div>
      <div class="stats">
        <div class="stat" data-stat="best"><span class="k">最高</span><span class="v accent" id="bestV">0</span></div>
        <div class="stat" data-stat="score"><span class="k">得分</span><span class="v" id="scoreV">0</span></div>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="切换主题">◐</button>
      <button class="icon-btn" id="help" aria-label="规则">?</button>
    </div>

    <div class="game-stage">
      <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
        <div class="toprow">
          <button class="btn new-btn" id="newBtn">新游戏</button>
          <button class="btn" id="undoBtn">撤销</button>
          <div class="spacer"></div>
          <span class="chip" id="maxChip">最大 0</span>
        </div>
        <div class="game-board" id="board">
          <div class="board-wrap">
            <canvas id="cv"></canvas>
          </div>
        </div>
        <div class="touch-pad dir" id="pad" aria-label="方向键">
          <button class="pad-btn up"    data-dir="up"    aria-label="上">▲</button>
          <button class="pad-btn left"  data-dir="left"  aria-label="左">◀</button>
          <div class="pad-blank"></div>
          <button class="pad-btn right" data-dir="right" aria-label="右">▶</button>
          <button class="pad-btn down"  data-dir="down"  aria-label="下">▼</button>
        </div>
        <p class="hint">键盘 <span class="kbd">←↑→↓</span> 或 <span class="kbd">WASD</span> 移动 · 手机滑动棋盘</p>
      </div>
    </div>
  </div>

  <script src="/assets/game.js"></script>
  <script>
  (function () {
    "use strict";
    /* ===================== 2048 ===================== */
    const SIZE = 4;
    const KEY = "2048";
    const WIN_VAL = 2048;
    const ANIM_MOVE = 130;   // ms 滑动
    const ANIM_POP = 200;    // ms 合并/出生 缩放
    const ANIM_SPAWN = 180;  // ms 新方块出现

    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d");
    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("scoreV");
    const bestEl = document.getElementById("bestV");
    const maxChip = document.getElementById("maxChip");

    let DPR = Math.max(1, window.devicePixelRatio || 1);
    let cssW = 0, cssH = 0;     // canvas CSS 像素尺寸
    let cell = 0, pad = 0;       // 单元格大小 / 间距

    /* ---- 瓦片：用稳定 id 跟踪动画 ----
       tile: {id, v, r, c,      // 逻辑坐标
              dr, dc,           // 显示坐标（用于插值，单位=格）
              born, merged, dying, spawnT, t0 }
    */
    let tiles = [];
    let nextId = 1;
    let score = 0;
    let best = 0;
    let maxVal = 0;
    let won = false;            // 是否已达成 2048
    let winShown = false;       // 本次胜利提示是否已弹过
    let over = false;
    let busy = false;           // 动画中，禁止再输入
    let history = [];           // 撤销栈：存 tiles 快照（深拷贝，重置动画字段）
    let rafId = 0;

    /* ---- 颜色：取 CSS 变量，便于主题切换 ---- */
    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }
    function hexA(c, a) {
      // 支持 #rrggbb 或 rgba(...)
      const s = String(c).trim();
      if (s.startsWith("#")) {
        const n = s.slice(1);
        const r = parseInt(n.substr(0,2),16), g = parseInt(n.substr(2,2),16), b = parseInt(n.substr(4,2),16);
        return `rgba(${r},${g},${b},${a})`;
      }
      return s;
    }

    /* 各数值的配色（背景 / 文字），用调色板变量做映射，高值走渐变 */
    const PALETTE = {
      2:    ["#cdc7e6", "#1c1635"],
      4:    ["#bcb4e0", "#1c1635"],
      8:    ["#38bdf8", "#fff"],
      16:   ["#8b5cf6", "#fff"],
      32:   ["#ec4899", "#fff"],
      64:   ["#f97316", "#fff"],
      128:  ["#fbbf24", "#1c1635"],
      256:  ["#34d399", "#1c1635"],
      512:  ["#22d3ee", "#1c1635"],
      1024: ["#a78bfa", "#fff"],
      2048: ["#f43f5e", "#fff"],
      4096: ["#f0abfc", "#1c1635"],
      8192: ["#60a5fa", "#fff"],
    };
    function tileColor(v) {
      if (PALETTE[v]) return PALETTE[v];
      // 更大值：走渐变两色
      return ["#f43f5e", "#fff"];
    }

    /* ---- 逻辑网格 ---- */
    function grid() {
      const g = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      for (const t of tiles) {
        if (!t.dying) g[t.r][t.c] = t;
      }
      return g;
    }
    function emptyCells() {
      const g = grid();
      const out = [];
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++)
        if (!g[r][c]) out.push([r, c]);
      return out;
    }

    function addRandomTile() {
      const empty = emptyCells();
      if (!empty.length) return null;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      const v = Math.random() < 0.9 ? 2 : 4;
      const t = {
        id: nextId++, v, r, c, dr: r, dc: c,
        spawnT: 0, t0: performance.now(), born: true, merged: false, dying: false,
      };
      tiles.push(t);
      return t;
    }

    /* ---- 尺寸 / DPR ---- */
    function resize() {
      DPR = Math.max(1, window.devicePixelRatio || 1);
      const rect = cv.getBoundingClientRect();
      cssW = rect.width;
      cssH = rect.height;
      cv.width = Math.round(cssW * DPR);
      cv.height = Math.round(cssH * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      pad = Math.round(cssW * 0.028);   // 内边距
      cell = (cssW - pad * (SIZE + 1)) / SIZE;
      draw();
    }

    /* ---- 坐标换算（格 -> CSS px） ---- */
    function cellX(c) { return pad + c * (cell + pad); }
    function cellY(r) { return pad + r * (cell + pad); }

    /* ---- 圆角矩形 ---- */
    function roundRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    /* ---- 绘制 ---- */
    function draw() {
      // 清空
      ctx.clearRect(0, 0, cssW, cssH);
      // 棋盘底
      const surf = cssVar("--surface-2") || "rgba(255,255,255,.10)";
      const border = cssVar("--border") || "rgba(255,255,255,.12)";
      ctx.fillStyle = surf;
      roundRect(0, 0, cssW, cssH, 12);
      ctx.fill();

      // 空格底
      ctx.fillStyle = cssVar("--surface") || "rgba(255,255,255,.06)";
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          roundRect(cellX(c), cellY(r), cell, cell, 10);
          ctx.fill();
        }
      }

      // 瓦片（dying 先画在底层，避免覆盖合并目标）
      const sorted = tiles.slice().sort((a, b) => (a.dying ? -1 : 1) - (b.dying ? -1 : 1));
      const now = performance.now();
      for (const t of tiles) drawTile(t, now);
    }

    function drawTile(t, now) {
      // 计算插值位置
      const dtMove = Math.min(1, (now - t.t0) / ANIM_MOVE);
      const ease = 1 - Math.pow(1 - dtMove, 3); // easeOutCubic
      const x = cellX(t.dc) + (cellX(t.c) - cellX(t.dc)) * ease;
      const y = cellY(t.dr) + (cellY(t.r) - cellY(t.dr)) * ease;

      // 缩放：spawn/merged 从 0->1.12->1，dying 从 1->0
      let scale = 1;
      if (t.born) {
        const p = Math.min(1, (now - t.t0) / ANIM_SPAWN);
        scale = 0.0 + (1.1 - 0.0) * easeOutBack(p);
        if (p >= 1) { t.born = false; }
      } else if (t.merged) {
        const p = Math.min(1, (now - t.mergedAt) / ANIM_POP);
        // 1 -> 1.18 -> 1
        scale = 1 + 0.18 * Math.sin(Math.min(1, p) * Math.PI);
        if (p >= 1) t.merged = false;
      }
      if (t.dying) {
        const p = Math.min(1, (now - t.dieAt) / ANIM_MOVE);
        scale = 1 - p; // 缩小消失（实际滑到位即被移除）
      }

      const size = cell * scale;
      const cx = cellX(t.c) + cell / 2; // 用最终位置中心 + 当前滑动偏移
      // 这里用滑动插值后的左上角
      const drawX = x + (cell - size) / 2;
      const drawY = y + (cell - size) / 2;

      const [bg, fg] = tileColor(t.v);

      // 高值（>=128）用渐变让视觉更精致
      if (t.v >= 128) {
        const g = ctx.createLinearGradient(drawX, drawY, drawX + size, drawY + size);
        g.addColorStop(0, bg);
        g.addColorStop(1, hexA(bg, 0.72));
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = bg;
      }
      // 阴影
      ctx.shadowColor = "rgba(0,0,0,.25)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 3;
      roundRect(drawX, drawY, size, size, 10);
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;

      // 数字
      ctx.fillStyle = fg;
      let fs = cell * 0.42;
      const txt = String(t.v);
      if (txt.length >= 3) fs = cell * 0.34;
      if (txt.length >= 4) fs = cell * 0.27;
      if (txt.length >= 5) fs = cell * 0.22;
      ctx.font = `800 ${fs}px "PingFang SC", system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(txt, drawX + size / 2, drawY + size / 2 + 1);
    }

    function easeOutBack(p) {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
    }

    /* ---- 动画循环 ---- */
    function tick() {
      const now = performance.now();
      // 清理已死瓦片（滑动结束）
      let changed = false;
      for (const t of tiles) {
        if (t.dying && (now - t.dieAt) >= ANIM_MOVE) { t._remove = true; changed = true; }
      }
      if (changed) tiles = tiles.filter(t => !t._remove);

      draw();

      // 是否还有进行中的动画
      const animating = tiles.some(t =>
        t.born || t.merged || t.dying ||
        (Math.abs(t.r - t.dr) > 0.001 || Math.abs(t.c - t.dc) > 0.001)
      );
      if (animating) {
        rafId = requestAnimationFrame(tick);
      } else {
        rafId = 0;
        busy = false;
        // 动画结束后检查胜负
        checkEnd();
      }
    }
    function startAnim() {
      busy = true;
      if (!rafId) rafId = requestAnimationFrame(tick);
    }

    /* ---- 移动逻辑 ----
       统一转换为“向左”处理：取一个方向向量 (dr,dc)，沿该方向逐行/列处理。
       对每条“线”提取非空瓦片，合并相邻相同，再贴到起点。
    */
    function moveDir(dir) {
      if (busy || over) return false;

      const lines = buildLines(dir); // 每条线上的瓦片按移动方向“起点在前”排序
      let moved = false;
      let gained = 0;
      const mergeTargets = []; // {survivorId, dyingId}

      saveHistory();

      for (const line of lines) {
        // line: 按移动后顺序排列的瓦片数组（从前到后），坐标占位按 line.index
        // 先紧凑（去掉空），相邻相同的合并
        const compacted = line.tiles.filter(t => !t.dying);
        const result = []; // {tile, mergedFrom?}
        let i = 0;
        while (i < compacted.length) {
          const cur = compacted[i];
          if (i + 1 < compacted.length && compacted[i + 1].v === cur.v) {
            // 合并：cur 移到目标位，compacted[i+1] 也移到同位然后 dying，新增一个翻倍瓦片？
            // 实现方式：保留 cur，把 i+1 标 dying，cur.v*=2 且 merged
            result.push({ tile: cur, mergedWith: compacted[i + 1] });
            i += 2;
          } else {
            result.push({ tile: cur });
            i += 1;
          }
        }

        // 把 result 放到 line 的前 N 个位置
        for (let k = 0; k < result.length; k++) {
          const pos = line.positions[k];
          const item = result[k];
          const t = item.tile;
          if (t.r !== pos.r || t.c !== pos.c) moved = true;
          // 记录显示起始位置（动画起点）
          t.dr = t.r; t.dc = t.c;
          t.r = pos.r; t.c = pos.c;
          t.t0 = performance.now();
          t.born = false;
          if (item.mergedWith) {
            const d = item.mergedWith;
            d.dr = d.r; d.dc = d.c;
            d.r = pos.r; d.c = pos.c;
            d.dying = true;
            d.dieAt = performance.now();
            t.v *= 2;
            t.merged = true;
            t.mergedAt = performance.now();
            gained += t.v;
            if (t.v > maxVal) maxVal = t.v;
            if (t.v === WIN_VAL && !won) { won = true; }
            moved = true;
          }
        }
      }

      if (moved) {
        score += gained;
        if (score > best) { best = score; SG.best(KEY, best); }
        updateHUD();
        // 新增方块
        addRandomTile();
        if (gained > 0) navigator.vibrate?.(12);
        startAnim();
      } else {
        // 没移动：弹出保存的历史，避免无效撤销
        history.pop();
      }
      return moved;
    }

    /* 构造按方向移动的“线” */
    function buildLines(dir) {
      const g = grid();
      const lines = [];
      if (dir === "left") {
        for (let r = 0; r < SIZE; r++) {
          const tiles = [];
          for (let c = 0; c < SIZE; c++) if (g[r][c]) tiles.push(g[r][c]);
          const positions = [];
          for (let c = 0; c < SIZE; c++) positions.push({ r, c });
          lines.push({ tiles, positions });
        }
      } else if (dir === "right") {
        for (let r = 0; r < SIZE; r++) {
          const tiles = [];
          for (let c = SIZE - 1; c >= 0; c--) if (g[r][c]) tiles.push(g[r][c]);
          const positions = [];
          for (let c = SIZE - 1; c >= 0; c--) positions.push({ r, c });
          lines.push({ tiles, positions });
        }
      } else if (dir === "up") {
        for (let c = 0; c < SIZE; c++) {
          const tiles = [];
          for (let r = 0; r < SIZE; r++) if (g[r][c]) tiles.push(g[r][c]);
          const positions = [];
          for (let r = 0; r < SIZE; r++) positions.push({ r, c });
          lines.push({ tiles, positions });
        }
      } else if (dir === "down") {
        for (let c = 0; c < SIZE; c++) {
          const tiles = [];
          for (let r = SIZE - 1; r >= 0; r--) if (g[r][c]) tiles.push(g[r][c]);
          const positions = [];
          for (let r = SIZE - 1; r >= 0; r--) positions.push({ r, c });
          lines.push({ tiles, positions });
        }
      }
      return lines;
    }

    /* ---- 胜负 ---- */
    function canMove() {
      const g = grid();
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (!g[r][c]) return true;
        const v = g[r][c].v;
        if (c + 1 < SIZE && g[r][c + 1] && g[r][c + 1].v === v) return true;
        if (r + 1 < SIZE && g[r + 1][c] && g[r + 1][c].v === v) return true;
      }
      return false;
    }
    function checkEnd() {
      // 胜利提示（仅一次）
      if (won && !winShown) {
        winShown = true;
        boardEl.classList.add("win-glow");
        const ov = SG.overlay({
          title: "达成 2048！",
          body: "太厉害了！继续挑战更高数字。",
          score: score,
          buttons: [
            { text: "继续游戏", kind: "", onClick: () => ov.hide() },
            { text: "新游戏", kind: "primary", onClick: () => { ov.hide(); newGame(); } },
          ],
        });
        ov.show();
        navigator.vibrate?.([20, 40, 20]);
        return;
      }
      if (!canMove()) {
        over = true;
        const ov = SG.overlay({
          title: "游戏结束",
          body: "没有可移动的方块了。",
          score: score,
          buttons: [
            { text: "撤销一步", kind: "", onClick: () => { ov.hide(); undo(); } },
            { text: "再来一局", kind: "primary", onClick: () => { ov.hide(); newGame(); } },
          ],
        });
        ov.show();
        navigator.vibrate?.([30, 30, 60]);
      }
    }

    /* ---- 撤销 ---- */
    function snapshot() {
      return tiles.filter(t => !t.dying).map(t => ({
        id: t.id, v: t.v, r: t.r, c: t.c, dr: t.r, dc: t.c,
        born: false, merged: false, dying: false, t0: 0,
      }));
    }
    function saveHistory() {
      history.push({ tiles: snapshot(), score, maxVal, won, winShown });
      if (history.length > 20) history.shift();
    }
    function undo() {
      if (!history.length) { SG.toast?.("没有可撤销的步骤"); return; }
      const s = history.pop();
      tiles = s.tiles.map(t => ({ ...t }));
      score = s.score; maxVal = s.maxVal; won = s.won; winShown = s.winShown;
      over = false;
      boardEl.classList.remove("win-glow");
      updateHUD();
      draw();
    }

    /* ---- HUD ---- */
    function updateHUD() {
      scoreEl.textContent = score;
      bestEl.textContent = best;
      maxChip.textContent = "最大 " + maxVal;
    }

    /* ---- 新游戏 ---- */
    function newGame() {
      history = [];
      tiles = [];
      score = 0; maxVal = 0;
      won = false; winShown = false; over = false;
      boardEl.classList.remove("win-glow");
      addRandomTile();
      addRandomTile();
      updateHUD();
      draw();
    }

    /* ---- 规则 ---- */
    function showRules() {
      const ov = SG.overlay({
        title: "怎么玩 2048",
        body:
          "用 <b>方向键</b>、<b>WASD</b> 或在棋盘上 <b>滑动</b> 移动所有方块。" +
          "两个相同数字的方块相撞会合并为它们的和。每步会随机出现一个新方块（2 或 4）。" +
          "拼出 <b>2048</b> 即获胜，之后可继续挑战更大数字。当无法再移动时游戏结束。",
        buttons: [
          { text: "开始游戏", kind: "primary", onClick: () => ov.hide() },
        ],
      });
      ov.show();
    }

    /* ---- 事件 ---- */
    function onKey(e) {
      const map = {
        ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down",
        a: "left", d: "right", w: "up", s: "down",
        A: "left", D: "right", W: "up", S: "down",
      };
      const dir = map[e.key];
      if (dir) {
        e.preventDefault();
        moveDir(dir);
      } else if (e.key === "z" || e.key === "Z") {
        if (e.ctrlKey || e.metaKey) { e.preventDefault(); undo(); }
      }
    }
    window.addEventListener("keydown", onKey);

    // 滑动
    SG.swipe(cv, dir => moveDir(dir));

    // 屏幕方向键
    document.getElementById("pad").addEventListener("click", e => {
      const b = e.target.closest(".pad-btn");
      if (b) moveDir(b.dataset.dir);
    });

    // 按钮
    document.getElementById("newBtn").addEventListener("click", newGame);
    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("help").addEventListener("click", showRules);
    document.getElementById("themeBtn").addEventListener("click", () => {
      SG.toggleTheme();
      // 颜色取自 CSS 变量，下一帧重绘即可
      requestAnimationFrame(draw);
    });

    // 防滚动 / 双击缩放
    document.addEventListener("touchmove", e => {
      if (e.target.closest("#cv")) e.preventDefault();
    }, { passive: false });
    let lastTap = 0;
    document.addEventListener("touchend", e => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // 尺寸
    const ro = new ResizeObserver(resize);
    ro.observe(boardEl);
    window.addEventListener("resize", resize);

    // 初始化
    best = SG.best(KEY);
    resize();
    newGame();
  })();
  </script>
</body>
</html>
