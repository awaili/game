<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数字华容道 Sliding Puzzle · slowpapa</title>
<meta name="description" content="经典数字华容道(15-puzzle)H5 小游戏：3×3 与 4×4 两档，打乱后按 1..N 顺序排好即胜，步数与计时，最佳记录持久化。">
<link rel="stylesheet" href="/assets/game.css">
<style>
  /* ---- Sliding-puzzle-specific layout ---- */
  .game-board.sliding {
    width: min(92vw, 420px);
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .sp-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 12px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sp-head .segment button { padding: 7px 16px; }

  /* the tile grid frame */
  .p-grid {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: inset 0 2px 10px -4px rgba(0,0,0,.4);
    touch-action: none;
    overflow: hidden;
  }
  /* subtle grid lines behind tiles */
  .p-grid::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, var(--border) 1px, transparent 1px),
      linear-gradient(to bottom, var(--border) 1px, transparent 1px);
    background-size: var(--cell, 33.33%) 33.33%;
    opacity: .4;
    pointer-events: none;
  }

  .sp-tile {
    position: absolute;
    top: 0; left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: #fff;
    cursor: pointer;
    user-select: none;
    background: linear-gradient(160deg, var(--accent) 0%, var(--accent-2) 100%);
    box-shadow: 0 4px 10px -4px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25), inset 0 -2px 6px rgba(0,0,0,.18);
    transition: transform .16s cubic-bezier(.34, 1.25, .64, 1), box-shadow .15s ease, filter .15s ease;
    will-change: transform;
    touch-action: manipulation;
    line-height: 1;
  }
  .sp-tile:active { filter: brightness(1.08); }
  .sp-tile.movable {
    box-shadow: 0 4px 12px -3px rgba(139,92,246,.5), inset 0 1px 0 rgba(255,255,255,.3), 0 0 0 1px rgba(255,255,255,.18);
  }
  .sp-tile.win-flash { animation: spWin .5s ease; }
  @keyframes spWin {
    0%,100% { filter: brightness(1); }
    50% { filter: brightness(1.5) saturate(1.3); }
  }
  .sp-tile .num { font-size: clamp(20px, 7vw, 34px); text-shadow: 0 1px 2px rgba(0,0,0,.35); }
  .p-grid.size-4 .sp-tile .num { font-size: clamp(16px, 5.4vw, 28px); }

  .sp-foot {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .hint-bar {
    text-align: center;
    color: var(--text-mute);
    font-size: 11px;
    margin-top: 10px;
    line-height: 1.6;
  }
  .hint-bar .kbd { margin: 0 2px; }

  @media (max-width: 380px) {
    .game-topbar .stat .v { font-size: 13px; }
    .game-topbar .stat .k { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-topbar">
    <a class="back" href="/" aria-label="返回游戏大厅">‹</a>
    <div class="title">数字华容道<small>Sliding Puzzle · 排好 1..N 即胜</small></div>
    <div class="stats">
      <div class="stat" data-stat="steps"><span class="k">步数</span><span class="v" id="s-steps">0</span></div>
      <div class="stat" data-stat="time"><span class="k">用时</span><span class="v" id="s-time">0:00</span></div>
      <div class="stat" data-stat="best"><span class="k">最佳</span><span class="v accent" id="s-best">—</span></div>
    </div>
    <button class="icon-btn" id="btn-reset" aria-label="重置">↻</button>
    <button class="icon-btn" id="btn-help" aria-label="规则">?</button>
    <button class="icon-btn" id="btn-theme" aria-label="切换主题">◐</button>
  </div>

  <div class="game-stage" id="stage">
    <div class="game-board sliding">
      <div class="sp-head">
        <div class="segment" id="size-seg" role="group" aria-label="难度">
          <button data-size="3" aria-pressed="true">3×3</button>
          <button data-size="4" aria-pressed="false">4×4</button>
        </div>
      </div>

      <div class="p-grid size-3" id="grid"></div>

      <div class="sp-foot">
        <button class="btn primary" id="btn-shuffle">重新打乱</button>
        <button class="btn" id="btn-reset2">重置</button>
      </div>

      <div class="hint-bar">
        点击与空格相邻的方块滑入空格 · <span class="kbd">←</span><span class="kbd">→</span><span class="kbd">↑</span><span class="kbd">↓</span> 或滑动 · 按 1..N 顺序排好即胜
      </div>
    </div>
  </div>
</div>

<script src="/assets/game.js"></script>
<script>
(function () {
  "use strict";

  const KEY = "sliding";
  let size = 3;          // 3 or 4
  let N = 9;             // size*size
  let cells = [];        // length N, cells[i] = tile number (0 = empty)
  let emptyIdx = 0;      // index of 0 in cells
  let steps = 0;
  let started = false;
  let won = false;
  let secs = 0;
  let timerId = 0;
  let cell = 0;          // px per cell

  const gridEl = document.getElementById("grid");
  const stage = document.getElementById("stage");
  const elSteps = document.getElementById("s-steps");
  const elTime = document.getElementById("s-time");
  const elBest = document.getElementById("s-best");
  const tileEls = {};    // number -> element

  /* ---- best (min steps & min time) per size, stored directly (lower is better) ---- */
  function bestKey(kind) { return "slowpapa-best-" + KEY + "-" + size + "-" + kind; }
  function getBest(kind) { return parseInt(localStorage.getItem(bestKey(kind)) || "0", 10) || 0; }
  function trySetBest(kind, val) {
    const b = getBest(kind);
    if (!b || val < b) { localStorage.setItem(bestKey(kind), String(val)); return val; }
    return b;
  }

  /* ---- solved state: [1,2,...,N-1,0] ---- */
  function solvedArr() {
    const a = [];
    for (let i = 1; i < N; i++) a.push(i);
    a.push(0);
    return a;
  }
  function isSolved() {
    for (let i = 0; i < N - 1; i++) if (cells[i] !== i + 1) return false;
    return cells[N - 1] === 0;
  }

  /* ---- shuffle by random legal moves from solved state (always solvable) ---- */
  function shuffle() {
    cells = solvedArr();
    emptyIdx = N - 1;
    const moves = size === 3 ? 120 : 400;
    let lastDir = -1;     // avoid immediate reversal
    const opposites = { 0: 1, 1: 0, 2: 3, 3: 2 }; // 0=up,1=down,2=left,3=right
    for (let k = 0; k < moves; k++) {
      const er = Math.floor(emptyIdx / size), ec = emptyIdx % size;
      const cand = [];
      if (er > 0) cand.push({ dir: 0, idx: emptyIdx - size });        // tile above slides down
      if (er < size - 1) cand.push({ dir: 1, idx: emptyIdx + size }); // tile below slides up
      if (ec > 0) cand.push({ dir: 2, idx: emptyIdx - 1 });           // tile left slides right
      if (ec < size - 1) cand.push({ dir: 3, idx: emptyIdx + 1 });     // tile right slides left
      const filtered = cand.filter(c => c.dir !== opposites[lastDir]);
      const pick = (filtered.length ? filtered : cand)[Math.floor(Math.random() * (filtered.length || cand.length))];
      cells[emptyIdx] = cells[pick.idx];
      cells[pick.idx] = 0;
      emptyIdx = pick.idx;
      lastDir = pick.dir;
    }
    // guard: extremely unlikely but ensure not already solved
    if (isSolved()) return shuffle();
  }

  /* ---- adjacency & move ---- */
  function adjacent(i, j) {
    const ri = Math.floor(i / size), ci = i % size;
    const rj = Math.floor(j / size), cj = j % size;
    return Math.abs(ri - rj) + Math.abs(ci - cj) === 1;
  }

  // move tile at cellIdx into the empty cell
  function moveTileAt(cellIdx) {
    if (won) return false;
    if (!adjacent(cellIdx, emptyIdx)) return false;
    cells[emptyIdx] = cells[cellIdx];
    cells[cellIdx] = 0;
    emptyIdx = cellIdx;
    steps++;
    if (!started) startTimer();
    updateStats();
    render();
    navigator.vibrate?.(8);
    if (isSolved()) doWin();
    return true;
  }

  // move by direction: arrow/swipe direction = direction tile travels toward empty
  // Up    -> tile below empty slides up   (empty moves down)
  // Down  -> tile above empty slides down (empty moves up)
  // Left  -> tile to right of empty slides left  (empty moves right)
  // Right -> tile to left of empty slides right  (empty moves left)
  function moveDir(dir) {
    if (won) return;
    const er = Math.floor(emptyIdx / size), ec = emptyIdx % size;
    let target = -1;
    if (dir === "up" && er < size - 1) target = emptyIdx + size;
    else if (dir === "down" && er > 0) target = emptyIdx - size;
    else if (dir === "left" && ec < size - 1) target = emptyIdx + 1;
    else if (dir === "right" && ec > 0) target = emptyIdx - 1;
    if (target >= 0) moveTileAt(target);
  }

  /* ---- render ---- */
  function buildTiles() {
    // remove old
    for (const k in tileEls) { tileEls[k].remove(); delete tileEls[k]; }
    for (let n = 1; n < N; n++) {
      const el = document.createElement("div");
      el.className = "sp-tile";
      el.dataset.num = n;
      el.innerHTML = '<span class="num">' + n + "</span>";
      el.addEventListener("click", () => onTileClick(n));
      gridEl.appendChild(el);
      tileEls[n] = el;
    }
  }

  function render() {
    const gap = cell * 0.06;
    const sz = cell - gap * 2;
    for (let i = 0; i < N; i++) {
      const n = cells[i];
      if (n === 0) continue;
      const el = tileEls[n];
      const r = Math.floor(i / size), c = i % size;
      el.style.width = sz + "px";
      el.style.height = sz + "px";
      el.style.transform = "translate(" + (c * cell + gap) + "px," + (r * cell + gap) + "px)";
      // highlight movable tiles
      el.classList.toggle("movable", adjacent(i, emptyIdx) && !won);
    }
  }

  function updateStats() {
    elSteps.textContent = steps;
    elBest.textContent = getBest("steps") ? (getBest("steps") + "步") : "—";
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60), ss = s % 60;
    return m + ":" + (ss < 10 ? "0" : "") + ss;
  }

  function updateTimer() {
    elTime.textContent = fmtTime(secs);
  }

  function startTimer() {
    started = true;
    if (timerId) return;
    timerId = setInterval(() => { secs++; updateTimer(); }, 1000);
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = 0; }
  }

  function resize() {
    const rect = gridEl.getBoundingClientRect();
    if (!rect.width) return;
    cell = rect.width / size;
    gridEl.style.setProperty("--cell", (100 / size) + "%");
    render();
  }

  /* ---- input ---- */
  function onTileClick(n) {
    if (won) return;
    // find current cell of n
    const idx = cells.indexOf(n);
    moveTileAt(idx);
  }

  // swipe on stage: tile travels in swipe direction toward empty
  SG.swipe(stage, (dir) => { moveDir(dir); });

  window.addEventListener("keydown", (e) => {
    const k = e.key;
    if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(k)) e.preventDefault();
    if (k === "ArrowLeft") moveDir("left");
    else if (k === "ArrowRight") moveDir("right");
    else if (k === "ArrowUp") moveDir("up");
    else if (k === "ArrowDown") moveDir("down");
    else if (k === "r" || k === "R") reset(true);
  });

  /* ---- win / help ---- */
  let overlay = null;
  function doWin() {
    won = true;
    stopTimer();
    // flash tiles
    for (let n = 1; n < N; n++) {
      const el = tileEls[n];
      if (el) { el.classList.add("win-flash"); setTimeout(() => el.classList.remove("win-flash"), 500); }
    }
    navigator.vibrate?.([14, 40, 24, 40, 30]);
    const bestSteps = trySetBest("steps", steps);
    const bestTime = trySetBest("time", secs);
    const newRecord = (bestSteps === steps || bestTime === secs);
    const body =
      (newRecord ? "<b style='color:var(--good)'>新纪录！</b><br>" : "") +
      "用时 <b>" + fmtTime(secs) + "</b> · 步数 <b>" + steps + "</b><br>" +
      "最佳：" + getBest("steps") + " 步 / " + fmtTime(getBest("time"));
    overlay = SG.overlay({
      title: size === 3 ? "8-puzzle 完成！" : "15-puzzle 完成！",
      score: steps + " 步",
      body,
      buttons: [
        { text: "再来一局", kind: "primary", onClick: () => { overlay.hide(); reset(true); } },
        { text: "返回大厅", kind: "", onClick: () => { location.href = "/"; } },
      ],
    });
    overlay.show();
  }

  function showHelp() {
    overlay = SG.overlay({
      title: "玩法",
      body: "经典数字华容道。<b>3×3</b>(8-puzzle)或<b>4×4</b>(15-puzzle)棋盘，" +
            "点击与空格相邻的方块，使其滑入空格。<br><br>" +
            "<b>目标</b>：将数字按 1..N 顺序排好（空格落在最后一格）即胜。<br>" +
            "<b>操作</b>：点击方块 · 方向键 / 屏幕滑动（方块朝该方向滑入空格）<br>" +
            "<b>记录</b>：按当前难度分别记录最少步数与最短用时。",
      buttons: [{ text: "开始", kind: "primary", onClick: () => overlay.hide() }],
    });
    overlay.show();
  }

  /* ---- reset / size ---- */
  function reset(reshuffle) {
    stopTimer();
    steps = 0;
    secs = 0;
    started = false;
    won = false;
    if (reshuffle || !cells.length) shuffle();
    buildTiles();
    updateStats();
    updateTimer();
    resize();
    render();
  }

  function setSize(s) {
    if (s === size) return;
    size = s;
    N = size * size;
    gridEl.className = "p-grid size-" + size;
    document.querySelectorAll("#size-seg button").forEach(b => {
      b.setAttribute("aria-pressed", String(Number(b.dataset.size) === size));
    });
    reset(true);
  }

  /* ---- wire UI ---- */
  document.getElementById("size-seg").addEventListener("click", (e) => {
    const b = e.target.closest("button[data-size]");
    if (b) setSize(Number(b.dataset.size));
  });
  document.getElementById("btn-shuffle").addEventListener("click", () => reset(true));
  document.getElementById("btn-reset").addEventListener("click", () => reset(true));
  document.getElementById("btn-reset2").addEventListener("click", () => reset(true));
  document.getElementById("btn-help").addEventListener("click", showHelp);
  document.getElementById("btn-theme").addEventListener("click", () => SG.toggleTheme());

  // prevent context menu / double-tap zoom inside the board
  document.addEventListener("contextmenu", (e) => { if (e.target.closest(".p-grid")) e.preventDefault(); });
  document.addEventListener("gesturestart", (e) => e.preventDefault());
  document.addEventListener("dblclick", (e) => { if (e.target.closest(".p-grid")) e.preventDefault(); }, { passive: false });

  /* ---- resize ---- */
  let resizeTimer = 0;
  window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 80); });
  if (window.ResizeObserver) new ResizeObserver(() => resize()).observe(gridEl);

  /* ---- boot ---- */
  reset(true);
  requestAnimationFrame(resize);
  if (!getBest("steps")) showHelp();
})();
</script>
</body>
</html>
