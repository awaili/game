<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>俄罗斯方块 Tetris · slowpapa</title>
<meta name="description" content="经典俄罗斯方块 H5 小游戏：7-bag 随机、影子投影、硬降、消行闪光，移动端滑动 + 方向键操控。">
<link rel="stylesheet" href="/assets/game.css">
<style>
  /* ---- Tetris-specific layout ---- */
  .tetris-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
  }
  .tetris-head .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-mute);
  }
  .tetris-head .mini {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .next-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  #next {
    display: block;
    width: 72px;
    height: 54px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    touch-action: none;
  }
  .stat-line {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1.05;
  }
  .stat-line .k { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: .06em; }
  .stat-line .v { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .stat-line .v.accent { color: var(--accent-2); }

  #play {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 10 / 20;
    max-height: 74vh;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    touch-action: none;
  }
  /* keep board from overflowing on short screens */
  .game-board.tetris { width: min(94vw, 300px); padding: 12px; }
  @media (min-width: 420px) { .game-board.tetris { width: min(94vw, 360px); } }

  .ctrls {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .hard-drop {
    height: var(--tap);
    padding: 0 22px;
    border-radius: 999px;
    border: none;
    background: var(--grad);
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: .05em;
    box-shadow: var(--shadow-soft);
    cursor: pointer;
    user-select: none;
    transition: transform .12s ease;
  }
  .hard-drop:active { transform: scale(.95); }

  .hint-bar {
    text-align: center;
    color: var(--text-mute);
    font-size: 11px;
    margin-top: 10px;
    line-height: 1.6;
  }
  .hint-bar .kbd { margin: 0 2px; }

  /* shrink topbar stats on small screens so 3 stats + 3 buttons fit */
  @media (max-width: 380px) {
    .game-topbar .stats { gap: 6px; }
    .game-topbar .stat .v { font-size: 13px; }
    .game-topbar .stat .k { font-size: 9px; }
  }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-topbar">
    <a class="back" href="/" aria-label="返回游戏大厅">‹</a>
    <div class="title">俄罗斯方块<small>滑动 / 方向键操控</small></div>
    <div class="stats">
      <div class="stat" data-stat="score"><span class="k">得分</span><span class="v" id="s-score">0</span></div>
      <div class="stat" data-stat="level"><span class="k">等级</span><span class="v" id="s-level">1</span></div>
      <div class="stat" data-stat="lines"><span class="k">行数</span><span class="v" id="s-lines">0</span></div>
    </div>
    <button class="icon-btn" id="btn-pause" aria-label="暂停">❚❚</button>
    <button class="icon-btn" id="btn-help" aria-label="规则">?</button>
    <button class="icon-btn" id="btn-theme" aria-label="切换主题">◐</button>
  </div>

  <div class="game-stage" id="stage">
    <div class="game-board tetris">
      <div class="tetris-head">
        <div class="mini">
          <div class="next-wrap">
            <span class="label">下一个</span>
            <canvas id="next" width="72" height="54"></canvas>
          </div>
        </div>
        <div class="mini">
          <div class="stat-line"><span class="k">最高分</span><span class="v accent" id="s-best">0</span></div>
        </div>
      </div>
      <canvas id="play" width="200" height="400"></canvas>

      <div class="ctrls">
        <div class="touch-pad dir" id="dpad">
          <button class="pad-btn up"    data-act="rotate" aria-label="旋转">⟳</button>
          <button class="pad-btn left"  data-act="left"  aria-label="左移">‹</button>
          <div class="pad-blank"></div>
          <button class="pad-btn right" data-act="right" aria-label="右移">›</button>
          <button class="pad-btn down" data-act="soft"  aria-label="软降">▾</button>
        </div>
        <button class="hard-drop" id="hard-drop">硬降 ⤓</button>
      </div>

      <div class="hint-bar">
        <span class="kbd">←</span><span class="kbd">→</span> 移动 ·
        <span class="kbd">↑</span> 旋转 ·
        <span class="kbd">↓</span> 软降 ·
        <span class="kbd">空格</span> 硬降 ·
        <span class="kbd">P</span> 暂停
      </div>
    </div>
  </div>
</div>

<script src="/assets/game.js"></script>
<script>
(function () {
  "use strict";

  /* ============ Constants ============ */
  const COLS = 10, ROWS = 20;
  const KEY = "tetris";

  // 7 tetromino base cell lists (in a 4x4 coordinate space).
  const SHAPES = {
    I: [[0,1],[1,1],[2,1],[3,1]],
    O: [[1,0],[2,0],[1,1],[2,1]],
    T: [[1,0],[0,1],[1,1],[2,1]],
    S: [[1,0],[2,0],[0,1],[1,1]],
    Z: [[0,0],[1,0],[1,1],[2,1]],
    J: [[0,0],[0,1],[1,1],[2,1]],
    L: [[2,0],[0,1],[1,1],[2,1]],
  };
  const PIECES = ["I","O","T","S","Z","J","L"];
  // Piece colors keyed by CSS variable name; fallbacks are explicit.
  const COLOR_VAR = {
    I: "--accent-3",   // cyan
    O: "--warn",        // yellow
    T: "--accent",      // purple
    S: "--good",        // green
    Z: "--bad",         // red
    J: "#3b82f6",       // blue (no matching var)
    L: "#f59e0b",       // orange
  };

  /* ============ State ============ */
  let grid;                 // ROWS x COLS, null or color string
  let current = null;       // { type, rot, x, y, cells }
  let bag = [];
  let nextType = null;
  let score = 0, lines = 0, level = 1;
  let dropAcc = 0, lastTime = 0;
  let clearingRows = null, clearStart = 0;
  const CLEAR_MS = 220;
  let paused = false;
  let gameOver = false;
  let rafId = 0;
  let softDropping = false;

  /* ============ DOM ============ */
  const canvas = document.getElementById("play");
  const ctx = canvas.getContext("2d");
  const nextCanvas = document.getElementById("next");
  const nctx = nextCanvas.getContext("2d");
  const stage = document.getElementById("stage");
  const elScore = document.getElementById("s-score");
  const elLevel = document.getElementById("s-level");
  const elLines = document.getElementById("s-lines");
  const elBest  = document.getElementById("s-best");

  let cell = 20; // css px per cell, set on resize
  let cssW = 200, cssH = 400;

  /* ============ Helpers ============ */
  function colors() {
    const cs = getComputedStyle(document.documentElement);
    const out = {};
    for (const p of PIECES) {
      const v = COLOR_VAR[p];
      out[p] = v.startsWith("--") ? (cs.getPropertyValue(v).trim() || "#888") : v;
    }
    out.border = cs.getPropertyValue("--border").trim() || "rgba(255,255,255,.12)";
    out.surface = cs.getPropertyValue("--surface").trim() || "rgba(255,255,255,.06)";
    return out;
  }
  let PAL = colors();
  document.addEventListener("themechange", () => { PAL = colors(); draw(); });
  // expose theme change event
  const _toggle = SG.toggleTheme;
  SG.toggleTheme = function () { const r = _toggle.apply(this, arguments); document.dispatchEvent(new Event("themechange")); return r; };

  function rotateCells(cells) {
    // clockwise: (x,y) -> (y, -x)
    let nx = cells.map(([x,y]) => [y, -x]);
    let minX = Math.min(...nx.map(c => c[0]));
    let minY = Math.min(...nx.map(c => c[1]));
    return nx.map(([x,y]) => [x - minX, y - minY]);
  }
  const ROT = {};
  PIECES.forEach(p => {
    ROT[p] = [SHAPES[p]];
    for (let i = 0; i < 3; i++) ROT[p].push(rotateCells(ROT[p][ROT[p].length-1]));
  });

  function shape(type, rot) { return ROT[type][rot % 4]; }
  function pieceWidth(type, rot) { const c = shape(type, rot); return Math.max(...c.map(x=>x[0])) + 1; }

  function newBag() {
    const b = PIECES.slice();
    for (let i = b.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [b[i], b[j]] = [b[j], b[i]];
    }
    return b;
  }
  function takeFromBag() {
    if (bag.length === 0) bag = newBag();
    return bag.pop();
  }

  function spawn(type) {
    const rot = 0;
    const cells = shape(type, rot);
    const w = Math.max(...cells.map(c=>c[0])) + 1;
    const x = Math.floor((COLS - w) / 2);
    const piece = { type, rot, x, y: 0, cells };
    if (collides(piece, 0, 0)) {
      // spawn collision => game over
      return piece; // caller checks
    }
    return piece;
  }

  function collides(piece, dx, dy, cells) {
    cells = cells || piece.cells;
    for (const [cx, cy] of cells) {
      const x = piece.x + cx + dx;
      const y = piece.y + cy + dy;
      if (x < 0 || x >= COLS || y >= ROWS) return true;
      if (y >= 0 && grid[y][x]) return true;
    }
    return false;
  }

  function merge(piece) {
    for (const [cx, cy] of piece.cells) {
      const x = piece.x + cx, y = piece.y + cy;
      if (y >= 0 && y < ROWS && x >= 0 && x < COLS) grid[y][x] = piece.type;
    }
  }

  function move(dx, dy) {
    if (!current || gameOver || paused || clearingRows) return false;
    if (!collides(current, dx, dy)) { current.x += dx; current.y += dy; return true; }
    return false;
  }

  function rotate() {
    if (!current || gameOver || paused || clearingRows) return;
    const newRot = (current.rot + 1) % 4;
    const cells = shape(current.type, newRot);
    // wall kicks: try a sequence of offsets
    const kicks = [[0,0],[-1,0],[1,0],[-2,0],[2,0],[0,-1],[-1,-1],[1,-1]];
    for (const [kx, ky] of kicks) {
      const test = { type: current.type, rot: newRot, x: current.x + kx, y: current.y + ky, cells };
      if (!collides(test, 0, 0, cells)) {
        current = test;
        return;
      }
    }
  }

  function softDrop() {
    if (!current || gameOver || paused || clearingRows) return;
    if (move(0, 1)) { score += 1; updateStats(); }
    else lockPiece();
  }

  function hardDrop() {
    if (!current || gameOver || paused || clearingRows) return;
    let d = 0;
    while (!collides(current, 0, 1)) { current.y += 1; d++; }
    if (d > 0) score += d * 2;
    lockPiece();
    navigator.vibrate?.(18);
  }

  function lockPiece() {
    merge(current);
    const full = [];
    for (let y = 0; y < ROWS; y++) {
      if (grid[y].every(c => c)) full.push(y);
    }
    if (full.length) {
      clearingRows = full;
      clearStart = performance.now();
      navigator.vibrate?.(10 + full.length * 8);
    } else {
      spawnNext();
    }
  }

  function finishClear() {
    const rows = clearingRows.slice().sort((a,b)=>a-b);
    // remove and shift down
    for (const y of rows) {
      grid.splice(y, 1);
      grid.unshift(new Array(COLS).fill(null));
    }
    const n = rows.length;
    lines += n;
    const pts = [0, 100, 300, 500, 800][n] * level;
    score += pts;
    const newLevel = Math.floor(lines / 10) + 1;
    if (newLevel !== level) level = newLevel;
    clearingRows = null;
    updateStats();
    spawnNext();
  }

  function spawnNext() {
    const type = nextType;
    nextType = takeFromBag();
    current = spawn(type);
    drawNext();
    if (collides(current, 0, 0)) {
      current = null;
      endGame();
    }
  }

  function dropInterval() {
    return Math.max(70, 800 - (level - 1) * 65);
  }

  /* ============ Rendering ============ */
  function resize() {
    const rect = canvas.getBoundingClientRect();
    // Use the element's CSS size (driven by CSS width / aspect-ratio).
    cssW = rect.width;
    cssH = rect.height;
    if (!cssW || !cssH) return;
    cell = cssW / COLS;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // next canvas
    const nrect = nextCanvas.getBoundingClientRect();
    const nw = nrect.width, nh = nrect.height;
    nextCanvas.width = Math.round(nw * dpr);
    nextCanvas.height = Math.round(nh * dpr);
    nctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
    drawNext();
  }

  function drawCell(c, x, y, size, color, opts) {
    opts = opts || {};
    const inset = opts.inset || 1;
    const px = x * size, py = y * size, s = size - inset;
    if (opts.ghost) {
      c.strokeStyle = color;
      c.lineWidth = 2;
      c.globalAlpha = 0.45;
      c.strokeRect(px + 2, py + 2, s - 3, s - 3);
      c.globalAlpha = 1;
      return;
    }
    // fill
    c.fillStyle = color;
    c.fillRect(px + inset, py + inset, s, s);
    // top highlight
    c.fillStyle = "rgba(255,255,255,0.22)";
    c.fillRect(px + inset, py + inset, s, Math.max(2, s * 0.16));
    // inner shade bottom-right
    c.fillStyle = "rgba(0,0,0,0.18)";
    c.fillRect(px + inset, py + inset + s - Math.max(2, s*0.16), s, Math.max(2, s*0.16));
    // border
    c.strokeStyle = "rgba(0,0,0,0.35)";
    c.lineWidth = 1;
    c.strokeRect(px + inset + 0.5, py + inset + 0.5, s - 1, s - 1);
  }

  function draw() {
    if (!cssW) return;
    // background
    ctx.clearRect(0, 0, cssW, cssH);
    ctx.fillStyle = PAL.surface;
    ctx.fillRect(0, 0, cssW, cssH);
    // grid lines
    ctx.strokeStyle = PAL.border;
    ctx.lineWidth = 1;
    for (let x = 1; x < COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*cell, 0); ctx.lineTo(x*cell, cssH); ctx.stroke();
    }
    for (let y = 1; y < ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*cell); ctx.lineTo(cssW, y*cell); ctx.stroke();
    }

    // locked cells
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const t = grid[y][x];
        if (t) drawCell(ctx, x, y, cell, PAL[t]);
      }
    }

    // clearing flash
    if (clearingRows) {
      const t = (performance.now() - clearStart) / CLEAR_MS;
      const a = 0.5 + 0.5 * Math.abs(Math.sin(t * Math.PI * 3));
      ctx.fillStyle = "rgba(255,255,255," + (0.55 * a).toFixed(3) + ")";
      for (const y of clearingRows) {
        ctx.fillRect(0, y * cell, cssW, cell);
      }
    }

    // ghost
    if (current && !gameOver && !clearingRows) {
      let gy = 0;
      while (!collides(current, 0, gy + 1)) gy++;
      for (const [cx, cy] of current.cells) {
        drawCell(ctx, current.x + cx, current.y + cy + gy, cell, PAL[current.type], { ghost: true });
      }
      // current piece
      for (const [cx, cy] of current.cells) {
        drawCell(ctx, current.x + cx, current.y + cy, cell, PAL[current.type]);
      }
    }
  }

  function drawNext() {
    const nw = nextCanvas.getBoundingClientRect().width;
    const nh = nextCanvas.getBoundingClientRect().height;
    nctx.clearRect(0, 0, nw, nh);
    nctx.fillStyle = PAL.surface;
    nctx.fillRect(0, 0, nw, nh);
    if (!nextType) return;
    const cells = shape(nextType, 0);
    const w = Math.max(...cells.map(c=>c[0])) + 1;
    const h = Math.max(...cells.map(c=>c[1])) + 1;
    const s = Math.min(nw / 5, nh / 3.2);
    const ox = (nw - w * s) / 2;
    const oy = (nh - h * s) / 2;
    for (const [cx, cy] of cells) {
      const px = ox + cx * s, py = oy + cy * s;
      nctx.fillStyle = PAL[nextType];
      nctx.fillRect(px + 1, py + 1, s - 2, s - 2);
      nctx.fillStyle = "rgba(255,255,255,0.22)";
      nctx.fillRect(px + 1, py + 1, s - 2, Math.max(2, s * 0.16));
      nctx.strokeStyle = "rgba(0,0,0,0.35)";
      nctx.strokeRect(px + 1.5, py + 1.5, s - 3, s - 3);
    }
  }

  function updateStats() {
    elScore.textContent = score;
    elLevel.textContent = level;
    elLines.textContent = lines;
    const best = SG.best(KEY, score);
    elBest.textContent = best;
  }

  /* ============ Loop ============ */
  function frame(now) {
    rafId = requestAnimationFrame(frame);
    if (!lastTime) lastTime = now;
    const dt = now - lastTime;
    lastTime = now;

    if (clearingRows) {
      if (now - clearStart >= CLEAR_MS) finishClear();
      draw();
      return;
    }
    if (!paused && !gameOver && current) {
      dropAcc += dt;
      const interval = softDropping ? Math.min(50, dropInterval()) : dropInterval();
      while (dropAcc >= interval) {
        dropAcc -= interval;
        if (!collides(current, 0, 1)) {
          current.y += 1;
          if (softDropping) { score += 1; updateStats(); }
        } else {
          lockPiece();
          break;
        }
      }
    }
    draw();
  }

  /* ============ Game over / pause / help ============ */
  let overlay = null;

  function endGame() {
    gameOver = true;
    const best = SG.best(KEY, score);
    overlay = SG.overlay({
      title: "游戏结束",
      score: score,
      body: `等级 ${level} · 消除 ${lines} 行<br>最高分 ${best}`,
      buttons: [
        { text: "再来一局", kind: "primary", onClick: () => { overlay.hide(); startGame(); } },
        { text: "返回大厅", kind: "", onClick: () => { location.href = "/"; } },
      ],
    });
    overlay.show();
  }

  function togglePause() {
    if (gameOver) return;
    if (clearingRows) return;
    paused = !paused;
    document.getElementById("btn-pause").textContent = paused ? "▶" : "❚❚";
    if (paused) {
      overlay = SG.overlay({
        title: "已暂停",
        body: "随时继续，方块等你。",
        buttons: [{ text: "继续", kind: "primary", onClick: () => { overlay.hide(); togglePause(); } }],
      });
      overlay.show();
    } else {
      // hide pause overlay if present
      if (overlay) overlay.hide();
    }
  }

  function showHelp() {
    const wasPaused = paused || gameOver;
    if (!paused && !gameOver) { paused = true; }
    overlay = SG.overlay({
      title: "玩法",
      body: "经典俄罗斯方块。滑动或方向键移动方块，填满整行即可消除得分。<br><br>" +
            "<b>左/右</b>：移动 · <b>上</b>：旋转 · <b>下</b>：软降 · <b>空格 / 硬降按钮</b>：直接落底<br>" +
            "每消除 10 行升一级，速度加快。消除越多，单次得分越高。",
      buttons: [{ text: "知道了", kind: "primary", onClick: () => {
        overlay.hide();
        if (!wasPaused) paused = false;
      }}],
    });
    overlay.show();
  }

  /* ============ Start ============ */
  function startGame() {
    grid = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
    bag = newBag();
    nextType = takeFromBag();
    score = 0; lines = 0; level = 1;
    dropAcc = 0; lastTime = 0;
    clearingRows = null;
    paused = false; gameOver = false;
    softDropping = false;
    document.getElementById("btn-pause").textContent = "❚❚";
    spawnNext();
    updateStats();
    resize();
  }

  /* ============ Input ============ */
  // Keyboard
  window.addEventListener("keydown", (e) => {
    const k = e.key;
    if (["ArrowLeft","ArrowRight","ArrowDown","ArrowUp"," ","Spacebar"].includes(k)) e.preventDefault();
    if (k === "ArrowLeft") move(-1, 0);
    else if (k === "ArrowRight") move(1, 0);
    else if (k === "ArrowDown") { softDropping = true; softDrop(); }
    else if (k === "ArrowUp") rotate();
    else if (k === " " || k === "Spacebar") hardDrop();
    else if (k === "p" || k === "P") togglePause();
  });
  window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowDown") softDropping = false;
  });

  // On-screen dpad
  document.getElementById("dpad").addEventListener("click", (e) => {
    const act = e.target.dataset.act;
    if (!act) return;
    if (act === "left") move(-1, 0);
    else if (act === "right") move(1, 0);
    else if (act === "rotate") rotate();
    else if (act === "soft") softDrop();
  });
  document.getElementById("hard-drop").addEventListener("click", hardDrop);
  document.getElementById("btn-pause").addEventListener("click", togglePause);
  document.getElementById("btn-help").addEventListener("click", showHelp);
  document.getElementById("btn-theme").addEventListener("click", () => SG.toggleTheme());

  // Swipe on stage
  SG.swipe(stage, (dir) => {
    if (gameOver || paused) return;
    if (dir === "left") move(-1, 0);
    else if (dir === "right") move(1, 0);
    else if (dir === "up") rotate();
    else if (dir === "down") softDrop();
  });

  // Prevent context menu / double-tap zoom on controls
  document.addEventListener("contextmenu", (e) => {
    if (e.target.closest(".touch-pad, .hard-drop, #play")) e.preventDefault();
  });
  document.addEventListener("gesturestart", (e) => e.preventDefault());

  // Resize
  let resizeTimer = 0;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 80);
  });

  /* ============ Boot ============ */
  startGame();
  rafId = requestAnimationFrame(frame);
  // ensure layout-dependent canvas sizing after first paint
  requestAnimationFrame(resize);
})();
</script>
</body>
</html>
