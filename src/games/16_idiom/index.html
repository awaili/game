<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>成语接龙 - Slowpapa</title>
  <meta name="description" content="成语接龙 Idiom Solitaire：内置 200+ 常用成语，玩家与 AI 轮流以末字接首字（同字优先、可同音），计分连胜，可跳过、提示，移动端键盘友好。Slowpapa 益智游戏大厅。">
  <link rel="stylesheet" href="/assets/game.css">
  <style>
    /* ---- idiom solitaire board (inline, theme-aware) ---- */
    .game-board { display: flex; flex-direction: column; gap: 14px; }

    /* chain head card — the idiom the next player must follow */
    .head-card {
      position: relative;
      background: var(--grad-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 14px 12px;
      text-align: center;
    }
    .head-card .label {
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      color: var(--text-mute); text-transform: uppercase;
    }
    .head-card .who {
      display: inline-block; margin-left: 8px;
      font-size: 11px; font-weight: 700; color: var(--accent-3);
    }
    .head-word {
      font-size: 30px; font-weight: 900; letter-spacing: 8px;
      margin: 6px 0 2px; line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .head-word .tail {
      color: var(--accent-2);
      text-shadow: 0 0 14px rgba(236,72,153,.45);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .8; } 50% { opacity: 1; } }
    .head-py {
      font-size: 12px; color: var(--text-mute); letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }
    .head-card.shake { animation: shake .35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* chain history strip */
    .chain-strip {
      display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 4px;
      scrollbar-width: thin;
    }
    .chain-strip::-webkit-scrollbar { height: 4px; }
    .chain-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chips { display: flex; gap: 6px; flex-wrap: nowrap; }
    .chain-chip {
      flex: 0 0 auto;
      font-size: 12px; font-weight: 700; padding: 5px 9px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); white-space: nowrap;
    }
    .chain-chip.me { border-color: var(--accent); color: var(--accent); }
    .chain-chip.ai { border-color: var(--accent-3); color: var(--accent-3); }

    /* candidate buttons */
    .cands-label {
      font-size: 12px; color: var(--text-mute); font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .cands-label .tag {
      font-size: 10px; padding: 2px 8px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    }
    .cands {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .cand {
      height: 40px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 16px; font-weight: 800; letter-spacing: 3px;
      cursor: pointer; transition: transform .12s ease, background .18s ease, border-color .18s ease;
      touch-action: manipulation;
    }
    .cand:active { transform: scale(.95); }
    .cand:hover { background: var(--surface-2); }
    .cand.hinted { border-color: var(--warn); box-shadow: 0 0 0 2px rgba(251,191,36,.35); }
    .cands.empty { grid-template-columns: 1fr; }
    .cands-empty {
      font-size: 13px; color: var(--text-mute); text-align: center; padding: 10px;
    }

    /* input row */
    .input-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    .input-row input {
      flex: 1; min-width: 0; height: 44px;
      border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 18px; font-weight: 700; letter-spacing: 4px; text-align: center;
      padding: 0 10px; outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .input-row input::placeholder { color: var(--text-mute); letter-spacing: 1px; font-weight: 500; }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,.25); }
    .input-row .btn { height: 44px; padding: 0 16px; }

    .action-row { margin-top: 4px; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .hint { margin: 0; }
    .think {
      font-size: 12px; font-weight: 700; color: var(--accent-3);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .think[hidden] { display: none !important; }
    .think::after {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-3); animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
  </style>
</head>

            <span class="think" id="think" hidden>AI 思考中</span>

        </div>

        <!-- actions -->

          <button class="btn sm ghost" id="end-btn">结束并记录</button>
          <button class="btn sm ghost" id="restart-btn">重开</button>
        </div>

      </div>
    </div>
  </div>

    const elScore = $("score-v"), elStreak = $("streak-v");

    /* ---------- helpers ---------- */
    function tailOf(it) { return { ch: it.w[3], py: it.p[3] }; }
    function headOf(it) { return { ch: it.w[0], py: it.p[0] }; }

    function follows(prev, next) {
      // same char beats same pinyin; accept either
      const t = tailOf(prev), h = headOf(next);
      if (t.ch === h.ch) return "same";      // exact same character
      if (pyMatch(t.py, h.py)) return "py";  // same pinyin (homophone)
      return false;
    }

    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function candidatesFor(tail) {
      // same-char first
      const same = (byChar[tail.ch] || []).filter(it => !state.used.has(it.w));
      const py = (byPy[tail.py] || []).filter(it => !state.used.has(it.w) && it.w[0] !== tail.ch);
      return { same, py };
    }

    function aiFind(tail) {
      const { same, py } = candidatesFor(tail);
      const pool = same.length ? same : py;
      return pool.length ? pickRandom(pool) : null;
    }

    /* ---------- render ---------- */
    function renderHead() {
      const it = state.head;
      const tail = tailOf(it);
      // highlight last char
      elHead.innerHTML = it.w.split("").map((c, i) =>
        i === 3 ? `<span class="tail">${c}</span>` : c
      ).join("");
      elPy.textContent = it.p.join(" ");
      const last = state.chain[state.chain.length - 1];
      const by = last ? last.by : "sys";
      elWho.textContent = by === "me" ? "· 你出的" : by === "ai" ? "· AI 出的" : "· 起点";
      elCard.classList.remove("shake");
    }

    function renderChips() {
      const items = state.chain.slice(-8);
      elChips.innerHTML = items.map(it =>
        `<span class="chain-chip ${it.by}">${it.w}</span>`
      ).join("");
      // scroll to end
      const strip = elChips.parentElement;
      strip.scrollLeft = strip.scrollWidth;
    }

    function renderCands() {
      const tail = tailOf(state.head);
      const { same, py } = candidatesFor(tail);
      const useSame = same.length > 0;
      const list = useSame ? same : py;
      elTag.textContent = useSame ? "同字" : "同音";
      elCands.classList.toggle("empty", list.length === 0);
      if (!list.length) {
        elCands.innerHTML = `<div class="cands-empty">库中暂无可用候选，请直接输入或跳过</div>`;
        return;
      }
      const shown = list.slice(0, 6);
      elCands.innerHTML = shown.map((it, i) =>
        `<button class="cand${i === state.hintIdx ? " hinted" : ""}" data-w="${it.w}">${it.w}</button>`
      ).join("");
    }

    function renderStats() {
      elScore.textContent = state.score;
      elStreak.textContent = state.streak;
    }

    function renderAll() {
      renderHead(); renderChips(); renderCands(); renderStats();
    }

    /* ---------- flow ---------- */
    function startGame(seedPick = true) {
      state.chain = [];
      state.used = new Set();
      state.score = 0;
      state.streak = 0;
      state.hintIdx = -1;
      state.busy = false;
      // pick a random starter
      const starter = pickRandom(IDIOMS);
      state.used.add(starter.w);
      state.head = starter;
      state.chain.push({ ...starter, by: "sys" });
      renderAll();
      elInp.value = "";
      elInp.focus();
    }

    function addScore(n) {
      state.score += n;
      if (state.score < 0) state.score = 0;
      renderStats();
    }

    function playerSubmit(raw) {
      if (state.busy) return;
      const w = (raw || "").trim();
      if (w.length !== 4) { shake(); SG.toast("请输入四字成语"); return; }
      const it = IDIOMS.find(x => x.w === w);
      if (!it) { shake(); SG.toast("库中没有这个成语"); return; }
      if (state.used.has(it.w)) { shake(); SG.toast("这个成语已用过"); return; }
      const ok = follows(state.head, it);
      if (!ok) {
        shake();
        const t = tailOf(state.head);
        SG.toast(`应以「${t.ch}」或同音字开头`);
        return;
      }
      // valid
      state.used.add(it.w);
      const gain = 10 + state.streak * 2;
      addScore(gain);
      state.streak++;
      state.chain.push({ ...it, by: "me" });
      state.head = it;
      state.hintIdx = -1;
      elInp.value = "";
      navigator.vibrate?.(30);
      renderAll();
      // AI turn
      aiTurn();
    }

    function aiTurn() {
      state.busy = true;
      elThink.hidden = false;
      setTimeout(() => {
        elThink.hidden = true;
        const tail = tailOf(state.head);
        const ai = aiFind(tail);
        if (!ai) {
          // AI cannot接 — bonus to player, stays player's turn
          addScore(20);
          state.streak++;
          SG.toast("AI 接不上！奖励 +20", 1800);
          navigator.vibrate?.([20, 40, 20]);
          renderStats();
          renderCands();
          state.busy = false;
          elInp.focus();
          return;
        }
        state.used.add(ai.w);
        state.chain.push({ ...ai, by: "ai" });
        state.head = ai;
        renderAll();
        state.busy = false;
        elInp.focus();
      }, 650 + Math.random() * 350);
    }

    function doSkip() {
      if (state.busy) return;
      addScore(-5);
      state.streak = 0;
      SG.toast("跳过 −5，连胜清零", 1400);
      navigator.vibrate?.(40);
      // AI keeps the chain going by itself (plays one), then player continues
      state.busy = true;
      elThink.hidden = false;
      setTimeout(() => {
        elThink.hidden = true;
        const tail = tailOf(state.head);
        let ai = aiFind(tail);
        if (!ai) {
          // pick any unused idiom as new head
          ai = IDIOMS.find(x => !state.used.has(x.w)) || pickRandom(IDIOMS);
          state.chain.push({ ...ai, by: "sys" });
        } else {
          state.used.add(ai.w);
          state.chain.push({ ...ai, by: "ai" });
        }
        state.head = ai;
        state.hintIdx = -1;
        renderAll();
        state.busy = false;
        elInp.focus();
      }, 600);
    }

    function doHint() {
      if (state.busy) return;
      const tail = tailOf(state.head);
      const { same, py } = candidatesFor(tail);
      const list = same.length ? same : py;
      if (!list.length) { SG.toast("暂无可提示的候选"); return; }
      addScore(-3);
      // pick a candidate index that exists among the shown ones
      const shown = list.slice(0, 6);
      const idx = Math.floor(Math.random() * shown.length);
      state.hintIdx = idx;
      renderCands();
      SG.toast("提示 −3", 1200);
    }

    function shake() {
      elCard.classList.remove("shake");
      // force reflow to restart animation
      void elCard.offsetWidth;
      elCard.classList.add("shake");
      navigator.vibrate?.(60);
    }

    function endGame() {
      state.best = SG.best("idiom", state.score);
      const isBest = state.score >= state.best && state.score > 0;
      SG.overlay({
        title: "本局结束",
        body: `本局得分 <b>${state.score}</b>，最高分 <b>${state.best}</b>。<br>` +
              (isBest ? "🎉 刷新最高分！" : "再来一局挑战自己？"),
        score: state.score,
        buttons: [
          { text: "再开一局", kind: "primary", onClick: () => { ov.hide(); startGame(); } },
          { text: "关闭", onClick: () => ov.hide() }
        ]
      }).show();
    }

    function showRules() {
      SG.overlay({
        title: "成语接龙规则",
        body: [
          "玩家与 AI 轮流接龙。每个成语的<b>首字</b>必须接上一个成语的<b>末字</b>。",
          "<br>• <b>同字</b>优先，库中无同字时可使用<b>同音字</b>（拼音相同）。",
          "<br>• 可点击下方候选成语，或在输入框输入库中成语后按「接龙」。",
          "<br>• 成功 +10 分（连胜额外 +2/级）；<b>提示</b> −3；<b>跳过</b> −5 且连胜清零。",
          "<br>• AI 接不上时奖励 +20 并继续；结束时可记录最高分。"
        ].join(""),
        buttons: [{ text: "开始游戏", kind: "primary", onClick: () => ov.hide() }]
      }).show();
    }

    /* ---------- events ---------- */
    elSubmit.addEventListener("click", () => playerSubmit(elInp.value));
    elInp.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); playerSubmit(elInp.value); }
    });
    elCands.addEventListener("click", e => {
      const b = e.target.closest(".cand");
      if (b) playerSubmit(b.dataset.w);
    });
    $("hint-btn").addEventListener("click", doHint);
    $("skip-btn").addEventListener("click", doSkip);
    $("end-btn").addEventListener("click", endGame);
    $("restart-btn").addEventListener("click", () => {
      SG.overlay({
        title: "重新开始？",
        body: "当前得分将清零（未记录最高分）。",
        buttons: [
          { text: "确定", kind: "primary", onClick: () => { ov.hide(); startGame(); } },
          { text: "取消", onClick: () => ov.hide() }
        ]
      }).show();
    });
    $("help").addEventListener("click", showRules);
    $("theme").addEventListener("click", () => SG.toggleTheme());

    // prevent double-tap zoom / context menu on buttons
    document.addEventListener("contextmenu", e => { if (e.target.closest(".cand,.btn")) e.preventDefault(); });
    let lastTap = 0;
    document.addEventListener("touchend", e => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    /* ---------- boot ---------- */
    startGame();
    // show rules on first visit
    if (!localStorage.getItem("slowpapa-idiom-seen")) {
      localStorage.setItem("slowpapa-idiom-seen", "1");
      showRules();
    }
  })();
  </script>
</body>
