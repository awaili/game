<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="翻牌记忆 Memory — 翻开两张相同图案消除，全部配对即胜。4×4 / 6×6 双难度。">
<title>翻牌记忆 · Memory</title>
<link rel="stylesheet" href="/assets/game.css">
<style>
  /* ====== 翻牌记忆专用样式 ====== */
  .memory-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 14px 14px calc(16px + var(--safe-bottom));
    gap: 12px;
  }
  .memory-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: min(94vw, 460px);
    flex-wrap: wrap;
  }
  .memory-toolbar .segment button { padding: 7px 14px; }

  .memory-board {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    width: min(94vw, 460px);
    display: grid;
    gap: 10px;
    touch-action: manipulation;
  }
  .memory-board.size-4 { grid-template-columns: repeat(4, 1fr); }
  .memory-board.size-6 { grid-template-columns: repeat(6, 1fr); gap: 7px; padding: 10px; }

  /* ====== 卡片 3D 翻转 ====== */
  .card {
    position: relative;
    aspect-ratio: 1 / 1;
    perspective: 700px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .42s cubic-bezier(.2, .7, .25, 1.1);
  }
  .card.flipped .card-inner,
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    border-radius: var(--radius-sm);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid var(--border);
  }
  .card-back {
    background: var(--grad-soft);
    color: var(--text-dim);
    font-weight: 800;
    font-size: clamp(18px, 5vw, 26px);
    letter-spacing: 1px;
  }
  .card-back::after {
    content: "❖";
    opacity: .55;
  }
  .card-front {
    background: var(--surface-2);
    transform: rotateY(180deg);
    font-size: clamp(26px, 7vw, 40px);
    line-height: 1;
  }
  .memory-board.size-6 .card-front { font-size: clamp(20px, 5.2vw, 32px); }

  /* 配对成功的卡片：高亮边框 + 轻微缩放 */
  .card.matched .card-front {
    background: var(--grad);
    color: #fff;
    box-shadow: 0 0 0 2px var(--good), 0 8px 18px -6px rgba(52,211,153,.5);
    animation: pop .32s ease;
  }
  @keyframes pop {
    0%   { transform: rotateY(180deg) scale(1); }
    45%  { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* 不匹配抖动 */
  .card.shake .card-inner { animation: shake .4s ease; }
  @keyframes shake {
    0%, 100% { transform: rotateY(0deg) translateX(0); }
    20% { transform: rotateY(0deg) translateX(-4px); }
    40% { transform: rotateY(0deg) translateX(4px); }
    60% { transform: rotateY(0deg) translateX(-3px); }
    80% { transform: rotateY(0deg) translateX(3px); }
  }
  .card.shake.flipped .card-inner { animation: shakeBack .4s ease; }
  @keyframes shakeBack {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    20% { transform: rotateY(180deg) translateX(-4px); }
    40% { transform: rotateY(180deg) translateX(4px); }
    60% { transform: rotateY(180deg) translateX(-3px); }
    80% { transform: rotateY(180deg) translateX(3px); }
  }

  .card.locked { pointer-events: none; }
  .card:not(.flipped):not(.matched):active .card-back { transform: scale(.96); }

  /* 翻牌时的进场动画 */
  .card { animation: dealIn .3s ease backwards; }
  @keyframes dealIn {
    from { opacity: 0; transform: translateY(8px) scale(.9); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<div class="game-shell">
  <div class="game-topbar">
    <a class="back" href="/" aria-label="返回游戏大厅">‹</a>
    <div class="title">翻牌记忆<small>翻两张相同图案消除</small></div>
    <div class="stats">
      <div class="stat" data-stat="moves"><span class="k">步数</span><span class="v" id="movesV">0</span></div>
      <div class="stat" data-stat="time"><span class="k">用时</span><span class="v" id="timeV">0″</span></div>
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="切换主题">◐</button>
    <button class="icon-btn" id="helpBtn" aria-label="规则">?</button>
  </div>

  <div class="memory-stage">
    <div class="memory-toolbar">
      <div class="segment" id="diffSeg" role="group" aria-label="难度">
        <button data-size="4" aria-pressed="true">4 × 4</button>
        <button data-size="6" aria-pressed="false">6 × 6</button>
      </div>
      <button class="btn primary sm" id="restartBtn">重开</button>
    </div>

    <div class="memory-board size-4" id="board"></div>
    <p class="hint" id="hint">点击两张卡片，图案相同即配对消除 · 全部配对即胜</p>
  </div>
</div>

<script src="/assets/game.js"></script>
<script>
(function () {
  "use strict";

  // ====== 图案库（emoji，足够 18 对 = 36 张供 6×6 使用）======
  const POOL = [
    "🍎","🍌","🍇","🍓","🍑","🍍","🥝","🍒",
    "🐱","🐶","🐰","🐼","🦊","🐯","🐸","🐵",
    "⭐","🌙","❤️","💎","🌈","🔥","🎵","⚡"
  ];

  const board = document.getElementById("board");
  const movesV = document.getElementById("movesV");
  const timeV = document.getElementById("timeV");
  const diffSeg = document.getElementById("diffSeg");
  const restartBtn = document.getElementById("restartBtn");
  const helpBtn = document.getElementById("helpBtn");
  const themeBtn = document.getElementById("themeBtn");

  let size = 4;
  let cards = [];        // {el, emoji, index, state}
  let firstCard = null;
  let lock = false;
  let moves = 0;
  let matched = 0;
  let timerId = null;
  let startTime = 0;
  let elapsed = 0;
  let started = false;

  // ---- 计时 ----
  function startTimer() {
    if (timerId) return;
    startTime = Date.now() - elapsed;
    timerId = setInterval(() => {
      elapsed = Date.now() - startTime;
      timeV.textContent = formatTime(elapsed);
    }, 250);
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
  }
  function resetTimer() {
    stopTimer();
    elapsed = 0;
    timeV.textContent = "0″";
  }
  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "″";
    const m = Math.floor(s / 60);
    return m + "′" + (s % 60).toString().padStart(2, "0") + "″";
  }

  // ---- 洗牌 ----
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ---- 建牌 ----
  function build() {
    resetBoard();
    const pairCount = (size * size) / 2;
    const chosen = shuffle(POOL.slice()).slice(0, pairCount);
    const deck = shuffle(chosen.concat(chosen));

    board.className = "memory-board size-" + size;
    board.innerHTML = "";
    cards = [];

    deck.forEach((emoji, i) => {
      const el = document.createElement("div");
      el.className = "card";
      el.style.animationDelay = (i * 0.015) + "s";
      el.innerHTML =
        '<div class="card-inner">' +
          '<div class="card-face card-back"></div>' +
          '<div class="card-face card-front">' + emoji + '</div>' +
        '</div>';
      el.setAttribute("role", "button");
      el.setAttribute("aria-label", "卡片");
      el.addEventListener("click", () => flip(i));
      board.appendChild(el);
      cards.push({ el, emoji, index: i, state: "hidden" });
    });

    firstCard = null;
    lock = false;
    moves = 0;
    matched = 0;
    movesV.textContent = "0";
    resetTimer();
    started = false;
  }

  function resetBoard() {
    // 占位，build 内已清
  }

  // ---- 翻牌 ----
  function flip(i) {
    if (lock) return;
    const c = cards[i];
    if (!c || c.state !== "hidden") return;

    if (!started) { started = true; startTimer(); }

    c.el.classList.add("flipped");
    c.state = "shown";
    navigator.vibrate?.(12);

    if (!firstCard) {
      firstCard = c;
      return;
    }

    // 第二张
    moves++;
    movesV.textContent = moves;

    if (firstCard.emoji === c.emoji) {
      // 配对
      firstCard.state = "matched";
      c.state = "matched";
      const a = firstCard, b = c;
      firstCard = null;
      lock = true;
      setTimeout(() => {
        a.el.classList.add("matched");
        b.el.classList.add("matched");
        a.el.classList.remove("flipped");
        b.el.classList.remove("flipped");
        a.el.classList.add("locked");
        b.el.classList.add("locked");
        navigator.vibrate?.(20);
        matched += 2;
        lock = false;
        if (matched === cards.length) win();
      }, 220);
    } else {
      // 不匹配：短暂展示后翻回
      lock = true;
      const a = firstCard, b = c;
      firstCard = null;
      setTimeout(() => {
        a.el.classList.add("shake");
        b.el.classList.add("shake");
      }, 350);
      setTimeout(() => {
        a.el.classList.remove("flipped", "shake");
        b.el.classList.remove("flipped", "shake");
        a.state = "hidden";
        b.state = "hidden";
        lock = false;
      }, 900);
    }
  }

  // ---- 胜利 ----
  function win() {
    stopTimer();
    const total = cards.length / 2;
    const score = computeScore(moves, total, elapsed);
    const prevBest = SG.best("memory");
    const isNew = score > prevBest;
    if (isNew) SG.best("memory", score);
    setTimeout(() => {
      const ov = SG.overlay({
        title: "🎉 全部配对！",
        body: "步数 <b>" + moves + "</b> · 用时 <b>" + formatTime(elapsed) +
              "</b><br>得分 <b>" + score + "</b>" +
              (isNew && score > 0 ? "<br><span style='color:var(--accent-2)'>新纪录！</span>" : ""),
        score: score,
        buttons: [
          { text: "再来一局", kind: "primary", onClick: () => { ov.hide(); build(); } },
          { text: "关闭", kind: "", onClick: () => ov.hide() }
        ]
      });
      ov.show();
      navigator.vibrate?.([30, 40, 60]);
    }, 350);
  }

  // 分数：理论最少步数 = 对数；越接近越高分；时间越短越好
  function computeScore(m, total, ms) {
    const minMoves = total; // 每对最少 1 步
    const efficiency = Math.max(0, minMoves / Math.max(m, minMoves));
    const timeBonus = Math.max(0, 1 - (ms / 1000) / (total * 8)); // 期望每对 8 秒
    return Math.round((efficiency * 800 + timeBonus * 200) * (total / 8));
  }

  // ---- 规则 ----
  function showHelp() {
    SG.overlay({
      title: "玩法",
      body: "点击翻开卡片，再翻一张：<b>图案相同</b>则配对消除并保持翻开；<b>不同</b>则翻回继续。<br>" +
            "把所有卡片配对即获胜。右上角显示步数与用时，分数越低步数越快越高。",
      buttons: [{ text: "知道了", kind: "primary", onClick: () => ov.hide() }]
    }).show();
  }

  // ---- 事件 ----
  diffSeg.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-size]");
    if (!btn) return;
    const ns = parseInt(btn.dataset.size, 10);
    if (ns === size) return;
    [...diffSeg.querySelectorAll("button")].forEach(b =>
      b.setAttribute("aria-pressed", String(b === btn)));
    size = ns;
    build();
  });

  restartBtn.addEventListener("click", () => { build(); });
  helpBtn.addEventListener("click", showHelp);
  themeBtn.addEventListener("click", () => SG.toggleTheme());

  // 防双击缩放 / 滚动
  document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });

  // 启动
  build();
})();
</script>
</body>
</html>
